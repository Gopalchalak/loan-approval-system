{% extends 'base.html' %}
{% block title %}Register - LoanSense AI{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center py-5" style="min-height:calc(100vh - 80px)">
  <div class="card shadow-lg" style="width:100%;max-width:500px;border-radius:20px;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div style="width:64px;height:64px;background:linear-gradient(135deg,#059669,#0d9488);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem">
          <i class="fas fa-user-plus text-white" style="font-size:1.6rem"></i></div>
        <h3 class="fw-bold">Create Account</h3>
        <p class="text-muted small">Join LoanSense AI today</p>
      </div>
      <form method="POST">
        <div class="row g-3">
          <div class="col-12"><label class="form-label fw-semibold small">Full Name *</label>
            <input type="text" name="name" class="form-control" placeholder="John Doe" required></div>
          <div class="col-12"><label class="form-label fw-semibold small">Email Address *</label>
            <input type="email" name="email" class="form-control" placeholder="john@example.com" required></div>
          <div class="col-12"><label class="form-label fw-semibold small">Password *</label>
            <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required></div>
          <div class="col-12"><label class="form-label fw-semibold small">Phone Number</label>
            <input type="tel" name="phone" class="form-control" placeholder="+91 9876543210"></div>
          <div class="col-12"><label class="form-label fw-semibold small">Address</label>
            <textarea name="address" class="form-control" rows="2" placeholder="Your address"></textarea></div>
        </div>
        <button type="submit" class="btn btn-success w-100 py-3 fw-semibold mt-4" style="border-radius:12px">
          <i class="fas fa-user-plus me-2"></i>Create Account</button>
      </form>
      <p class="text-center text-muted small mt-3">Already have an account? <a href="/login" class="text-primary fw-semibold">Sign In</a></p>
    </div>
  </div>
</div>
{% endblock %}
